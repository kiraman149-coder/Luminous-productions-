<!DOCTYPE html>
<html>
<head>
  <title>Custom - Luminous Productions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #004d00, #000000); /* green → black gradient */
      color: #ffffff;
      text-align: center;
      padding: 20px;
    }

    /* BACK BUTTON */
    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #004d00; /* solid green */
      color: #ffffff;
      padding: 10px 15px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
    }

    /* TITLE */
    h1 {
      margin-top: 80px;
      font-size: 28px;
      color: #ffffff;
    }

    /* DESCRIPTION */
    .desc {
      margin-top: 20px;
      font-size: 16px;
      color: #ccc;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    /* BUTTON */
    .contact-btn {
      margin-top: 40px;
      display: inline-block;
      padding: 15px 25px;
      background: #004d00; /* green button */
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
    }

  </style>
</head>

<body>

  <!-- BACK BUTTON -->
  <a href="index.html" class="back">← Back</a>

  <!-- TITLE -->
  <h1>Custom Shoots</h1>

  <!-- DESCRIPTION -->
  <div class="desc">
    Have a unique idea for your event.? here you can customise our services to your needs. take control 
  </div>

  <!-- book now BUTTON -->
  <a href="#" class="contact-btn">Request a Custom Shoot</a>

</body>
</html>
