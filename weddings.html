.book-btn:hover {

}
    /* BACK BUTTON */

    }

    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 20px;
    }

      height: 200px;
      border-radius: 8px;
    }
