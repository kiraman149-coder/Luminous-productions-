<!DOCTYPE html>
<html>
<head>
  <title>Luminous Productions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    /* LOGO */
    .logo {
      margin-top: 40px;
      font-size: 28px;
      font-weight: bold;
      color: #c9a96e;
    }

    /* TAGLINE */
    .tagline {
      margin-top: 10px;
      font-size: 16px;
      color: #ccc;
    }

    /* MAIN GRID */
    .grid {
      margin-top: 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    /* BUTTON STYLE */
    .card {
      padding: 40px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      display: block;
    }

    /* CATEGORY COLORS */
    .weddings { background: #c9a96e; color: #000; }
    .casual { background: #a0d8ef; color: #000; }
    .maternity { background: #ff69b4; }
    .seasonal { background: #8b4513; }

  </style>
</head>

<body>

  <div class="logo">Luminous Productions</div>
  <div class="tagline">We tell your story in every shade of light</div>

  <div class="grid">
    <a href="weddings.html" class="card weddings">Weddings</a>
    <a href="casual.html" class="card casual">Casual</a>
    <a href="maternity.html" class="card maternity">Maternity</a>
    <a href="seasonal.html" class="card seasonal">Seasonal</a>
  </div>

</body>
</html>
