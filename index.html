<!DOCTYPE html>
<html>
<head>
  <title>Luminous Productions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    /* LOGO */
    .logo {
      margin-top: 40px;
      font-size: 28px;
      font-weight: bold;
      color: #c9a96e;
      z-index: 2;
      position: relative;
    }

    /* TAGLINE */
    .tagline {
      margin-top: 10px;
      font-size: 16px;
      color: #ccc;
      z-index: 2;
      position: relative;
    }

    /* HERO IMAGE - FULL SCREEN + CINEMATIC ZOOM */
    .hero {
      width: 100%;
      height: 80vh;
      background: url('seasonal.jpg') center center no-repeat;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 1px 1px 4px black;

      /* Cinematic zoom animation */
      animation: zoomIn 10s ease-in-out forwards;
    }

    @keyframes zoomIn {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    /* MAIN GRID */
    .grid {
      margin-top: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    /* CATEGORY BUTTONS */
    .card {
      padding: 40px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      display: block;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    /* CATEGORY COLORS */
    .weddings { background: #c9a96e; color: #000; }
    .casual { background: #a0d8ef; color: #000; }
    .maternity { background: #ff69b4; color: #000; }
    .seasonal { background: #8b4513; color: #fff; }
    .custom { background: #000000; color: #ffffff; }

  </style>
</head>

<body>

  <div class="logo">Luminous Productions</div>
  <div class="tagline">We tell your story in every shade of light</div>

  <!-- HERO IMAGE -->
  <div class="hero">Your Story, Our Vision</div>

  <!-- CATEGORY GRID -->
  <div class="grid">
    <a href="weddings.html" class="card weddings">Weddings</a>
    <a href="casual.html" class="card casual">Casual</a>
    <a href="maternity.html" class="card maternity">Maternity</a>
    <a href="seasonal.html" class="card seasonal">Seasonal</a>
    <a href="custom.html" class="card custom">Custom</a>
  </div>

</body>
</html>
