<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kira Visuals</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial, sans-serif;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .button {
      background: #c9a96e;
      color: white;
      padding: 15px 25px;
      text-decoration: none;
      border-radius: 5px;
    }

    .portfolio {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 20px;
    }

    .portfolio img {
      width: 100%;
      border-radius: 5px;
    }

    .contact {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>

<section class="hero">
  <h1>Not just photos.<br>Stories you can feel.</h1>
  <a href="https://wa.me/251XXXXXXXXX" class="button">Book a Session</a>
</section>

<section class="portfolio">
  <img src="https://via.placeholder.com/500">
  <img src="https://via.placeholder.com/500">
  <img src="https://via.placeholder.com/500">
  <img src="https://via.placeholder.com/500">
</section>

<section class="contact">
  <a href="https://wa.me/251XXXXXXXXX" class="button">Message me</a>
</section>

</body>
</html>
