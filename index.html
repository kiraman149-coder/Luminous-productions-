<!DOCTYPE html>
<html>
<head>
  <title>Luminous Productions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    /* LOGO */
    .logo {
      margin-top: 40px;
      font-size: 28px;
      font-weight: bold;
      color: #c9a96e;
    }

    /* TAGLINE */
    .tagline {
      margin-top: 10px;
      font-size: 16px;
      color: #ccc;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      width: 100%;
      height: 80vh;
      overflow: hidden; /* crops image */
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%; /* trims slightly from top */
      animation: zoomIn 12s ease-in-out forwards;
    }

    /* Soft dark overlay */
    .hero::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
      z-index: 2;
    }

    @keyframes zoomIn {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    /* CATEGORY GRID */
    .grid {
      margin-top: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    /* CATEGORY BUTTONS */
    .card {
      padding: 40px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      display: block;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 25px rgba(0,0,0,0.4);
    }

    /* CATEGORY COLORS */
    .weddings { background: #c9a96e; color: #000; }
    .casual { background: #a0d8ef; color: #000; }
    .maternity { background: #ff69b4; color: #000; }
    .seasonal { background: #8b4513; color: #fff; }
    .custom { background: #000000; color: #ffffff; }

  </style>
</head>

<body>

  <div class="logo">Luminous Productions</div>
  <div class="tagline">We tell your story in every shade of light</div>

  <!-- HERO -->
  <div class="hero">
    <img src="seasonal.jpg" class="hero-img">
    <div class="hero-text">Your Story, Our Vision</div>
  </div>

  <!-- CATEGORIES -->
  <div class="grid">
    <a href="weddings.html" class="card weddings">Weddings</a>
    <a href="casual.html" class="card casual">Casual</a>
    <a href="maternity.html" class="card maternity">Maternity</a>
    <a href="seasonal.html" class="card seasonal">Seasonal</a>
    <a href="custom.html" class="card custom">Custom</a>
  </div>

</body>
</html>
