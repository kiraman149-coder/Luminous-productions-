<!DOCTYPE html>
<html>
<head>
  <title>Seasonal - Luminous Productions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #3e2723, #ffffff); /* brown → white */
      color: #3e2723; /* brown text */
      text-align: center;
    }
.book-btn {
  margin-top: 30px;
  display: inline-block;
  padding: 15px 25px;
  background: #3e2723; /* dark brown matches Seasonal theme */
  color: #ffffff;
  text-decoration: none;
  font-weight: bold;
  border-radius: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
} 
.book-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
    /* BACK BUTTON */
    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #3e2723; /* brown */
      color: #ffffff;
      padding: 10px 15px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
    }

    /* TITLE */
    h1 {
      margin-top: 80px;
      color: #3e2723;
    }

    /* IMAGE GRID */
    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 20px;
    }

    /* PLACEHOLDER BOX */
    .box {
      background: rgba(62, 39, 35, 0.2); /* soft brown tint */
      height: 200px;
      border-radius: 8px;
      border: 1px solid rgba(62, 39, 35, 0.3);
    }

  </style>
</head>

<body>

  <!-- BACK BUTTON -->
  <a href="index.html" class="back">← Back</a>

</body>
